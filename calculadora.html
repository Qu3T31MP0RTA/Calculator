<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="calculadora.css">
</head>

<body>
    <div class="calculator">
        <div class="calculation">
            <div class="display"><input type="text" id="input" placeholder="0" disabled></div>
            <div class="buttons">
                <button data-number="7" class="digit-button button">7</button>
                <button data-number="8" class="digit-button button">8</button>
                <button data-number="9" class="digit-button button">9</button>
                <button data-number="+" class="operation-button button">7</button>
            </div>
        </div>

        <div class="history">
            <h2 id="historyTitle">History</h2>
            <div id="historyContent"></div>
        </div>
    </div>



    <script src="calculadora.js"></script>
</body>

</html>
